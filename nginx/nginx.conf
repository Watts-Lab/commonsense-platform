server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;

    index index.html index.htm index.nginx-debian.html;

    server_name _;

    location / {
            try_files $uri /index.html;
    }

    location /api {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Commonsense Survey Explorer ("report") — separate sidecar container.
    # The trailing slash on proxy_pass strips the /report/ prefix, so the
    # Python server receives /, /static/..., /api/... at its own root.
    # Redirect /report -> /report/ so relative asset paths resolve correctly.
    location = /report {
        return 301 /report/;
    }

    location /report/ {
        proxy_pass http://localhost:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
}
